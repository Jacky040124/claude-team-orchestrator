<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Team Orchestrator execution protocol</title>
  <desc id="desc">An architecture diagram showing a request moving through PRD approval, team approval, bounded specialist roles, owned tasks, and a final build gate.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111B35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C5CFC"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1200" height="620" rx="28" fill="url(#background)"/>
  <rect x="1" y="1" width="1198" height="618" rx="27" fill="none" stroke="#263552" stroke-width="2"/>

  <text x="64" y="68" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="750" letter-spacing="0.4">FROM REQUEST TO OWNED PARALLEL WORK</text>
  <rect x="868" y="37" width="268" height="40" rx="20" fill="#17233E" stroke="#33466D"/>
  <text x="1002" y="62" text-anchor="middle" fill="#9FB0CB" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="650" letter-spacing="0.7">SKILL.md PROTOCOL · NOT A RUNTIME</text>

  <line x1="174" y1="239" x2="259" y2="239" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="429" y1="239" x2="501" y2="239" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="699" y1="239" x2="771" y2="239" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="941" y1="239" x2="1014" y2="239" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="64" y="174" width="110" height="130" rx="18" fill="#17233E" stroke="#33466D"/>
    <text x="119" y="207" text-anchor="middle" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" letter-spacing="1.2">REQUEST</text>
    <path d="M98 232h42a8 8 0 0 1 8 8v26a8 8 0 0 1-8 8h-18l-10 9v-9H98a8 8 0 0 1-8-8v-26a8 8 0 0 1 8-8Z" fill="none" stroke="#7DD3FC" stroke-width="2"/>
    <line x1="101" y1="246" x2="137" y2="246" stroke="#7DD3FC" stroke-width="2"/>
    <line x1="101" y1="258" x2="126" y2="258" stroke="#7DD3FC" stroke-width="2"/>

    <rect x="259" y="158" width="170" height="162" rx="18" fill="#17233E" stroke="#7C5CFC" stroke-width="1.5"/>
    <text x="344" y="192" text-anchor="middle" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" letter-spacing="1.2">SPECIFY</text>
    <text x="344" y="226" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="700">Clarify + PRD</text>
    <text x="344" y="252" text-anchor="middle" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">goal · scope · criteria</text>
    <rect x="286" y="276" width="116" height="28" rx="14" fill="#2C2257"/>
    <text x="344" y="295" text-anchor="middle" fill="#DDD6FE" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700">HUMAN GATE 1</text>

    <rect x="501" y="139" width="198" height="200" rx="18" fill="#17233E" stroke="#2DD4BF" stroke-width="1.5"/>
    <text x="600" y="173" text-anchor="middle" fill="#5EEAD4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" letter-spacing="1.2">SCOPE THE TEAM</text>
    <text x="600" y="207" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">Choose the minimum set</text>
    <g fill="#24324F" stroke="#40557E">
      <rect x="523" y="226" width="64" height="26" rx="13"/>
      <rect x="594" y="226" width="82" height="26" rx="13"/>
      <rect x="523" y="260" width="75" height="26" rx="13"/>
      <rect x="605" y="260" width="71" height="26" rx="13"/>
    </g>
    <g fill="#B9C7DC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="650" text-anchor="middle">
      <text x="555" y="243">FRONTEND</text>
      <text x="635" y="243">BACKEND</text>
      <text x="560" y="277">TESTER</text>
      <text x="640" y="277">RESEARCH</text>
    </g>
    <rect x="536" y="299" width="128" height="27" rx="14" fill="#153D3A"/>
    <text x="600" y="318" text-anchor="middle" fill="#99F6E4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700">HUMAN GATE 2</text>

    <rect x="771" y="139" width="170" height="200" rx="18" fill="#17233E" stroke="#33466D"/>
    <text x="856" y="173" text-anchor="middle" fill="#93C5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" letter-spacing="1.2">COORDINATE</text>
    <text x="856" y="206" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">Owned parallel work</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">
      <rect x="794" y="227" width="124" height="25" rx="7" fill="#202D49"/>
      <circle cx="808" cy="239.5" r="4" fill="#7C5CFC"/>
      <text x="820" y="244" fill="#CBD5E1">owner</text>
      <rect x="794" y="260" width="124" height="25" rx="7" fill="#202D49"/>
      <circle cx="808" cy="272.5" r="4" fill="#2DD4BF"/>
      <text x="820" y="277" fill="#CBD5E1">dependencies</text>
      <rect x="794" y="293" width="124" height="25" rx="7" fill="#202D49"/>
      <circle cx="808" cy="305.5" r="4" fill="#7DD3FC"/>
      <text x="820" y="310" fill="#CBD5E1">file boundary</text>
    </g>

    <rect x="1014" y="174" width="122" height="130" rx="18" fill="#17233E" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="1075" y="207" text-anchor="middle" fill="#FCD34D" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" letter-spacing="1.2">VERIFY</text>
    <path d="M1049 239l17 17 34-38" fill="none" stroke="#FCD34D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1075" y="285" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">build gate</text>
  </g>

  <rect x="64" y="389" width="1072" height="1" fill="#263552"/>
  <text x="64" y="430" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="650" letter-spacing="1.1">VERIFIED IN THE CHECKED IN PROTOCOL</text>

  <g filter="url(#shadow)">
    <rect x="64" y="454" width="330" height="104" rx="16" fill="#141F36" stroke="#2C3E61"/>
    <text x="88" y="492" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="800">2</text>
    <text x="123" y="489" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">approval gates</text>
    <text x="88" y="526" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">PRD first, role plan second</text>

    <rect x="435" y="454" width="330" height="104" rx="16" fill="#141F36" stroke="#2C3E61"/>
    <text x="459" y="492" fill="#5EEAD4" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="800">5</text>
    <text x="494" y="489" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">bounded roles</text>
    <text x="459" y="526" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">minimum useful subset only</text>

    <rect x="806" y="454" width="330" height="104" rx="16" fill="#141F36" stroke="#2C3E61"/>
    <text x="830" y="492" fill="#FCD34D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="800">1</text>
    <text x="865" y="489" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">exit condition</text>
    <text x="830" y="526" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">build or compile must pass</text>
  </g>

  <rect x="64" y="585" width="1072" height="4" rx="2" fill="url(#accent)"/>
</svg>
