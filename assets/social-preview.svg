<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Team Orchestrator social preview</title>
  <desc id="desc">A code native architecture preview for a Claude Code multi agent orchestration protocol.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090E1B"/>
      <stop offset="0.55" stop-color="#101932"/>
      <stop offset="1" stop-color="#152344"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C5CFC"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="14" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <circle cx="1150" cy="80" r="240" fill="#7C5CFC" opacity="0.07"/>
  <circle cx="1130" cy="610" r="300" fill="#2DD4BF" opacity="0.06"/>
  <rect x="44" y="44" width="1192" height="552" rx="28" fill="none" stroke="#2A3A5B" stroke-width="2"/>

  <rect x="76" y="76" width="254" height="38" rx="19" fill="#17233E" stroke="#344A73"/>
  <text x="203" y="101" text-anchor="middle" fill="#AAB9D0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" letter-spacing="1">SKILL.md · PROTOCOL DESIGN</text>

  <text x="76" y="183" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="62" font-weight="820" letter-spacing="-1.4">Team Orchestrator</text>
  <text x="76" y="232" fill="#B7C4D8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="500">From one request to an accountable agent team.</text>
  <text x="76" y="269" fill="#7587A5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">A Claude Code skill for deliberate parallel delivery. Not a runtime framework.</text>

  <line x1="215" y1="392" x2="278" y2="392" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="462" y1="392" x2="525" y2="392" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="709" y1="392" x2="772" y2="392" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="956" y1="392" x2="1019" y2="392" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="76" y="337" width="139" height="110" rx="17" fill="#17233E" stroke="#33466D"/>
    <text x="145.5" y="372" text-anchor="middle" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" letter-spacing="1">REQUEST</text>
    <text x="145.5" y="408" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="700">Open ended</text>
    <text x="145.5" y="431" text-anchor="middle" fill="#94A3B8" font-size="12">goal</text>

    <rect x="278" y="326" width="184" height="132" rx="17" fill="#17233E" stroke="#7C5CFC" stroke-width="1.5"/>
    <text x="370" y="361" text-anchor="middle" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" letter-spacing="1">SPECIFY</text>
    <text x="370" y="397" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="700">Clarify + PRD</text>
    <rect x="313" y="416" width="114" height="26" rx="13" fill="#2C2257"/>
    <text x="370" y="434" text-anchor="middle" fill="#DDD6FE" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700">APPROVAL 1</text>

    <rect x="525" y="326" width="184" height="132" rx="17" fill="#17233E" stroke="#2DD4BF" stroke-width="1.5"/>
    <text x="617" y="361" text-anchor="middle" fill="#5EEAD4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" letter-spacing="1">DELEGATE</text>
    <text x="617" y="397" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="700">5 fixed roles</text>
    <rect x="560" y="416" width="114" height="26" rx="13" fill="#153D3A"/>
    <text x="617" y="434" text-anchor="middle" fill="#99F6E4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700">APPROVAL 2</text>

    <rect x="772" y="326" width="184" height="132" rx="17" fill="#17233E" stroke="#33466D"/>
    <text x="864" y="361" text-anchor="middle" fill="#93C5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" letter-spacing="1">COORDINATE</text>
    <text x="864" y="397" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="700">Owned tasks</text>
    <text x="864" y="426" text-anchor="middle" fill="#94A3B8" font-size="12">dependencies · files</text>

    <rect x="1019" y="337" width="185" height="110" rx="17" fill="#17233E" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="1111.5" y="372" text-anchor="middle" fill="#FCD34D" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" letter-spacing="1">VERIFY</text>
    <text x="1111.5" y="408" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="700">Build gate</text>
    <text x="1111.5" y="431" text-anchor="middle" fill="#94A3B8" font-size="12">then report</text>
  </g>

  <rect x="76" y="525" width="1128" height="5" rx="2.5" fill="url(#line)"/>
  <text x="76" y="565" fill="#8192AE" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="650" letter-spacing="0.8">2 APPROVAL GATES   ·   5 BOUNDED ROLES   ·   1 EXIT CONDITION</text>
</svg>
